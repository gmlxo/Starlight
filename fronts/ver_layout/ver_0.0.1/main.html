<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- jQuery-4.0.0.min.js 연결 -->
    <script src="/fronts/jQuery/jquery-4.0.0.min.js"></script>
    <script src="/fronts/jQuery/jquery-ui.min.js"></script>
    <!-- fonts.googleapis.com 연결 - icon -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <title>starlight layout</title>
    <style>
        * { padding: 0; margin: 0; box-sizing: content-box; }

        html, body, html>body>div { width: 100%; height: 100%; }
        html>body>div>* { border: 1px solid; text-align: center; }

        html>body>div>div>footer { border-top: 1px solid green; }

        #main-contents-box { user-select: none; }
       
        /* .set-icon-parent { position: relative; } */
        /* .set-icon-parent > span.material-symbols-outlined { position: absolute; }  */
    </style>
    <script>

        function _$fnCheckingNull(p) {
            if(p===null||p===undefined||p.toLowerCase==="null") {
                return true;
            }
            return false
        }

        /** 
         * function _fnOpenShadowPage(elementId, uri, mode="open") {
         *     mode=mode==null?"open":mode; // IE모드 에러 방지
         *
         *     $.get(uri, function(html) {
         *         var element = document.getElementById(elementId);
         *         var shadow = element.attachShadow({
         *             mode: mode
         *         });
         * 
         *         shadow.innerHTML = `
         *             ${html}
         *         `;
         *     });
         * }
         */

        function _$fnLoadPage(element, uri, func=null) {
            func=func==null?function() {}:func;
            $(element).empty().load(uri, func);
        }
        
        $(document).ready(function() {
            /* main content 영역 불러오기 */
            /**
             * ver 1 - jQuery load : 스타일 영향 받음
             * $("div.main-contents-box").load("./main-content-layout.html");
             */

             /**
             * ver 2 - shadow Dom : load와 비슷하게 화면을 불러 올 수 록 느려짐
             * _fnOpenShadowPage("main-contents-box", "./main-content-layout.html");
             */

            /**
             * ver 3 - jQuery empty load : 
             */
            _$fnLoadPage("#main-contents-box", "./ver_0.0.1/web-novel.menu.html");
        });
    </script>
</head>
<body>
    <div style="display: flex;">
        <header style="width: min(14%, 173px); height: 100%; position: sticky; border-right: 2px solid #000;">
            <nav>
                header and menu
                <div class="header-logo-box">
                    <!-- <span class="material-symbols-outlined">kid_star</span> -->
                </div>
                <div class="header-menu-box">

                </div>
                <div class="header-user-box">
                    
                </div>
            </nav>
        </header>
        <div style="flex: 1; height: 100%; overflow: hidden auto">
            <main style="min-height: calc(100% - 57px);">
                <!-- main content -->
                <div id="main-contents-box"></div>
            </main>
            <footer style="height: 57px;">
                footer
            </footer>
        </div>
    </div>
</body>
</html>
